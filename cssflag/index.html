<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Flag</title>
</head>

<style>
    .Orange-box{
        background-color: orange;
        height: 80px;
        width: 500px;
    
    }

    .White-box{
        background-color: white;
        height: 80px;
        width: 500px;
    }

    .Blue-circle{
        border: 5px solid blue;
        height: 70px;
        width: 70px;
        border-radius: 50%;
        position: absolute;
        left: 225px;
    }

    .Green-box{
        background-color: green;
        height: 80px;
        width: 500px;
       
        
    }

    .line{
        position: absolute;
        width: 2px;
        height: 70px;
        background-color: blue;
        left: 50%;
        transform-origin: center;
    }

    .line1 { transform: rotate(0deg); }
    .line2 { transform: rotate(45deg); }
    .line3 { transform: rotate(90deg); }
    .line4 { transform: rotate(135deg); }
    
    .Indian-flag{
        width: 500px;
        position: relative;
        top: 100px;
        left: 200px;
        border: 5px solid black;
    }

</style>
<body>
    <div class="Indian-flag">

    
    <div class="Orange-box"></div>
    <div class="White-box">
        <div class="Blue-circle">
            <div class="line">
                <div class="line line1"></div>
                <div class="line line2"></div>
                <div class="line line3"></div>
                <div class="line line4"></div>
            </div>
        </div>
    </div>
    <div class="Green-box"></div>

    </div>
</body>
</html>
